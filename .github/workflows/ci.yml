name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality-gates:
    name: quality-gates
    permissions:
      contents: read
      checks: read
      pull-requests: read
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci

  release:
    name: release-cdn-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality-gates
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Detect release-worthy changes
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Skip if this commit already has a semver tag — prevents reruns from
          # bumping the version and publishing a duplicate asset package for
          # identical source, which would advance the @2 alias unnecessarily.
          git fetch --tags --force origin
          EXISTING_TAG="$(git tag --points-at "$AFTER_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)"
          if [ -n "$EXISTING_TAG" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Commit $AFTER_SHA already tagged as $EXISTING_TAG; skipping release."
            exit 0
          fi

          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            DIFF_BASE="$(git rev-parse "$AFTER_SHA^" 2>/dev/null || git hash-object -t tree /dev/null)"
          else
            DIFF_BASE="$BEFORE_SHA"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "$DIFF_BASE" "$AFTER_SHA")

          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No changed files detected."
            exit 0
          fi

          node scripts/release-should-publish.mjs "${CHANGED_FILES[@]}" | tee /tmp/release-decision.txt
          cat /tmp/release-decision.txt >> "$GITHUB_OUTPUT"

      - name: Build release assets
        if: steps.changes.outputs.release == 'true'
        run: npm run build:release

      - name: Calculate next release version
        if: steps.changes.outputs.release == 'true'
        id: version
        run: |
          set -euo pipefail
          TAG="$(node scripts/next-release-tag.mjs patch)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure npm version is unpublished
        if: steps.changes.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "@wcpos/wp-admin-landing@$VERSION" version >/dev/null 2>&1; then
            echo "@wcpos/wp-admin-landing@$VERSION already exists on npm" >&2
            exit 1
          fi

      - name: Stage publishable npm package
        if: steps.changes.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/stage-release-package.mjs assets .release-package "$VERSION"

      - name: Verify staged npm package
        if: steps.changes.outputs.release == 'true'
        run: node scripts/verify-release-package.mjs .release-package

      - name: Publish package to npm
        if: steps.changes.outputs.release == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish .release-package --access public

      - name: Verify jsDelivr exact and alias URLs
        if: steps.changes.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node scripts/verify-jsdelivr-alias.mjs "$VERSION"

      - name: Create GitHub release
        if: steps.changes.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --notes "Automated npm/jsDelivr release for version $VERSION.

          JS: https://cdn.jsdelivr.net/npm/@wcpos/wp-admin-landing@2/assets/js/welcome.js
          CSS: https://cdn.jsdelivr.net/npm/@wcpos/wp-admin-landing@2/assets/css/welcome.css
          Exact JS: https://cdn.jsdelivr.net/npm/@wcpos/wp-admin-landing@$VERSION/assets/js/welcome.js
          Exact CSS: https://cdn.jsdelivr.net/npm/@wcpos/wp-admin-landing@$VERSION/assets/css/welcome.css"
