name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality-gates:
    name: quality-gates
    permissions:
      contents: read
      checks: read
      pull-requests: read
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  build-pr-assets:
    name: build-pr-assets
    # Only run on same-repo PRs — fork PRs can't use the org bot token.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - quality-gates
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      # Push with a GitHub App token so the resulting commit retriggers CI
      # (and `quality-gates` registers against the new HEAD SHA, satisfying
      # branch protection). GITHUB_TOKEN pushes don't trigger workflows.
      - name: Generate bot app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.WCPOS_BOT_APP_ID }}
          private-key: ${{ secrets.WCPOS_BOT_PRIVATE_KEY }}

      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Commit built assets if changed
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/

          if git diff --cached --quiet; then
            echo "Assets already up to date with source; nothing to commit."
            exit 0
          fi

          git commit -m "build: update generated assets"
          git push origin "HEAD:${PR_BRANCH}"

  release:
    name: release-cdn-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality-gates
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Commit built assets if changed
        id: build_commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/

          if git diff --cached --quiet; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "No asset changes to commit."
          else
            git commit -m "build: update generated assets [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "Assets committed and pushed."
          fi

      - name: Detect release-worthy changes
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ steps.build_commit.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            DIFF_BASE="$(git rev-parse "$AFTER_SHA^" 2>/dev/null || git hash-object -t tree /dev/null)"
          else
            DIFF_BASE="$BEFORE_SHA"
          fi

          if git diff --quiet "$DIFF_BASE" "$AFTER_SHA" -- src assets vite.config.ts package.json package-lock.json tsconfig.json; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No shipped asset changes detected; skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Shipped asset changes detected; creating a release tag."
          fi

      - name: Skip if commit already has a version tag
        if: steps.changes.outputs.release == 'true'
        id: tagged
        env:
          RELEASE_SHA: ${{ steps.build_commit.outputs.sha }}
        run: |
          set -euo pipefail

          if git tag --points-at "$RELEASE_SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tagged=true" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged; skipping."
          else
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next tag
        if: steps.changes.outputs.release == 'true' && steps.tagged.outputs.tagged != 'true'
        id: version
        run: |
          echo "tag=$(node scripts/next-release-tag.mjs patch)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.changes.outputs.release == 'true' && steps.tagged.outputs.tagged != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ steps.build_commit.outputs.sha }}
        run: |
          gh release create "$TAG" \
            --target "$RELEASE_SHA" \
            --title "$TAG" \
            --notes "Automated patch release for jsDelivr CDN assets from $RELEASE_SHA."
