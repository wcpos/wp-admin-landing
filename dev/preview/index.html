<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WooCommerce POS — landing previews</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #1d2327; color: #e4e7eb; }
    header { padding: 20px 24px; border-bottom: 1px solid #2c333a; }
    header h1 { margin: 0 0 6px; font-size: 18px; }
    header p { margin: 0; color: #9aa4af; font-size: 13px; }
    header a { color: #f5c451; }
    .controls { padding: 14px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: #23282d; }
    .controls label { font-size: 13px; color: #c3cad2; }
    .controls button { background: #2c333a; color: #e4e7eb; border: 1px solid #3a424b; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .controls button.active { background: #CD2C24; border-color: #CD2C24; color: #fff; }
    .stage { padding: 24px; }
    .frame-wrap { background: #f0f0f1; border-radius: 8px; overflow: hidden; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,.4); transition: max-width .15s; }
    iframe { width: 100%; height: 1400px; border: 0; display: block; background: #f0f0f1; }
    .meta { color: #6b7480; font-size: 12px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>WooCommerce POS — wp-admin landing previews</h1>
    <p>Freshly built from this branch. Not the live plugin — analytics are disabled here. Variant ← buttons · width ← buttons.</p>
  </header>
  <div class="controls">
    <label>Variant:</label>
    <button data-variant="free-plus" class="active">free-plus</button>
    <button data-variant="indie">indie</button>
    <span style="width:16px"></span>
    <label>Width:</label>
    <button data-width="1100" class="active">desktop 1100</button>
    <button data-width="900">900</button>
    <button data-width="600">tablet 600</button>
    <button data-width="380">phone 380</button>
    <span style="width:16px"></span>
    <button id="open-tab">open in new tab ↗</button>
  </div>
  <div class="stage">
    <div class="frame-wrap" id="wrap" style="max-width:1100px">
      <iframe id="frame" src="./free-plus.html"></iframe>
    </div>
    <div class="meta" id="meta">free-plus · 1100px</div>
  </div>
  <script>
    var variant = 'free-plus', width = 1100;
    var frame = document.getElementById('frame'), wrap = document.getElementById('wrap'), meta = document.getElementById('meta');
    function refresh() {
      frame.src = './' + variant + '.html?t=' + Date.now();
      wrap.style.maxWidth = width + 'px';
      meta.textContent = variant + ' · ' + width + 'px';
    }
    document.querySelectorAll('button[data-variant]').forEach(function (b) {
      b.onclick = function () {
        variant = b.dataset.variant;
        document.querySelectorAll('button[data-variant]').forEach(function (x) { x.classList.toggle('active', x === b); });
        refresh();
      };
    });
    document.querySelectorAll('button[data-width]').forEach(function (b) {
      b.onclick = function () {
        width = parseInt(b.dataset.width, 10);
        document.querySelectorAll('button[data-width]').forEach(function (x) { x.classList.toggle('active', x === b); });
        refresh();
      };
    });
    document.getElementById('open-tab').onclick = function () { window.open('./' + variant + '.html', '_blank'); };
  </script>
</body>
</html>
